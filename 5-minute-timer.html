<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Timer">
<title>5:00 Timer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #1a8c3a;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.8s ease;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 2vh, 20px);
    padding: 16px;
    width: 100%;
    height: 100%;
  }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: min(52vw, 62vh);
    line-height: 1;
    letter-spacing: 0.04em;
    color: #ffffff;
    text-shadow: 0 6px 40px rgba(0,0,0,0.15);
    white-space: nowrap;
    text-align: center;
  }

  .status {
    font-size: clamp(0.8rem, 2.2vw, 1.2rem);
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .btn-row { display: flex; gap: clamp(12px, 3vw, 28px); }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    padding: clamp(14px, 2.5vw, 24px) clamp(32px, 8vw, 72px);
    border-radius: 6px;
    transition: all 0.2s ease;
    -webkit-appearance: none;
  }

  .btn-start {
    background: rgba(255,255,255,0.95);
    color: #1a8c3a;
    font-weight: 700;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }

  .btn-start:active { transform: scale(0.96); }

  .btn-reset {
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 2px solid rgba(255,255,255,0.45);
  }

  .btn-reset:active { transform: scale(0.96); }

  .flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    background: rgba(255,255,255,0.35);
    transition: opacity 0.05s ease;
  }

  .alert-badge {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-120px);
    background: rgba(0,0,0,0.3);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.3rem, 4vw, 2.2rem);
    letter-spacing: 0.25em;
    padding: clamp(10px, 2vw, 18px) clamp(24px, 5vw, 52px);
    border-radius: 60px;
    z-index: 200;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    border: 2px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }

  .alert-badge.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body id="body">

<div class="flash-overlay" id="flashOverlay"></div>
<div class="alert-badge" id="alertBadge"></div>

<div class="container">
  <div class="time-display" id="timeDisplay">5:00</div>
  <div class="status" id="statusLine">READY</div>
  <div class="btn-row">
    <button class="btn btn-start" id="startBtn" onclick="toggleTimer()">START</button>
    <button class="btn btn-reset" onclick="resetTimer()">RESET</button>
  </div>
</div>

<script>
  const TOTAL = 300000;

  const PHASES = [
    { bg: '#1a8c3a', btnColor: '#1a8c3a' },
    { bg: '#c8a000', btnColor: '#c8a000' },
    { bg: '#b01010', btnColor: '#b01010' },
    { bg: '#111111', btnColor: '#111111' },
  ];

  let remaining = TOTAL;
  let running = false;
  let startTime = null;
  let startRemaining = TOTAL;
  let animFrame = null;
  let audioCtx = null;

  const milestones = [
    { ms: 30000, id: null, label: '30 SECONDS LEFT',  phaseIndex: 1, fired: false, danger: false },
    { ms: 0,     id: null, label: "TIME'S UP!",       phaseIndex: 3, fired: false, danger: true  },
  ];

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function beep(freq, duration, type, vol, delay) {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
      gain.gain.setValueAtTime(0.001, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + duration + 0.05);
    } catch(e) {}
  }

  function playAlert(danger) {
    if (danger) {
      beep(880, 0.15, 'square', 0.5, 0);
      beep(880, 0.15, 'square', 0.5, 0.2);
      beep(1100, 0.3,  'square', 0.5, 0.4);
    } else {
      beep(660, 0.15, 'sine', 0.45, 0);
      beep(880, 0.25, 'sine', 0.45, 0.2);
    }
  }

  function playDone() {
    beep(440, 0.12, 'square', 0.6, 0);
    beep(330, 0.12, 'square', 0.6, 0.15);
    beep(220, 0.7,  'square', 0.5, 0.3);
  }

  function flash() {
    const el = document.getElementById('flashOverlay');
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 150);
    setTimeout(() => { el.style.opacity = '0.6'; }, 300);
    setTimeout(() => { el.style.opacity = '0'; }, 500);
  }

  function showBadge(text) {
    const el = document.getElementById('alertBadge');
    el.textContent = text;
    el.className = 'alert-badge show';
    setTimeout(() => { el.className = 'alert-badge'; }, 2500);
  }

  function applyPhase(index) {
    const phase = PHASES[index];
    document.getElementById('body').style.background = phase.bg;
    document.getElementById('startBtn').style.color = phase.btnColor;
  }

  function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2, '0');
  }

  function updateDisplay(ms) {
    document.getElementById('timeDisplay').textContent = formatTime(ms);
  }

  function checkMilestones(ms) {
    milestones.forEach(m => {
      if (!m.fired && ms <= m.ms) {
        m.fired = true;
        applyPhase(m.phaseIndex);
        flash();
        showBadge(m.label);
        m.ms === 0 ? playDone() : playAlert(m.danger);
      }
    });
  }

  function tick() {
    const elapsed = Date.now() - startTime;
    remaining = Math.max(0, startRemaining - elapsed);
    updateDisplay(remaining);
    checkMilestones(remaining);
    if (remaining <= 0) {
      running = false;
      document.getElementById('startBtn').textContent = 'START';
      document.getElementById('statusLine').textContent = 'DONE';
      return;
    }
    animFrame = requestAnimationFrame(tick);
  }

  function toggleTimer() {
    try { getAudioCtx(); } catch(e) {}
    if (!running) {
      running = true;
      startTime = Date.now();
      startRemaining = remaining;
      document.getElementById('startBtn').textContent = 'PAUSE';
      document.getElementById('statusLine').textContent = 'RUNNING';
      animFrame = requestAnimationFrame(tick);
    } else {
      running = false;
      cancelAnimationFrame(animFrame);
      document.getElementById('startBtn').textContent = 'RESUME';
      document.getElementById('statusLine').textContent = 'PAUSED';
    }
  }

  function resetTimer() {
    running = false;
    cancelAnimationFrame(animFrame);
    remaining = TOTAL;
    startRemaining = TOTAL;
    milestones.forEach(m => { m.fired = false; });
    document.getElementById('startBtn').textContent = 'START';
    document.getElementById('statusLine').textContent = 'READY';
    document.getElementById('alertBadge').className = 'alert-badge';
    applyPhase(0);
    updateDisplay(TOTAL);
  }

  updateDisplay(TOTAL);
</script>
</body>
</html>
